name: Deploy

# Triggers:
#   • push to main / any PR  → typecheck/build only (no AWS access, no deploy)
#   • tag v*                 → wait for required reviewer, then deploy production
#
# There is no automatic-deploy path. The only way to push code to AWS is a
# release tag, which is gated by the "production" GitHub Environment's
# required-reviewer rule.
#
# Auth: short-lived OIDC tokens from GitHub → AWS STS. No long-lived AWS keys
# stored anywhere. The trust policy on AWS_DEPLOY_ROLE_ARN is scoped to THIS
# repo + the "production" environment by scripts/setup-oidc.sh.
#
# Security notes:
#   • No untrusted input (issue/PR/commit text) is interpolated into any run: step.
#   • Only GitHub-owned context (vars.AWS_DEPLOY_ROLE_ARN, github.run_id,
#     github.event_name, github.ref) is referenced — those cannot be controlled
#     by an external contributor.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

# Don't run two deploys for the same ref at the same time (avoid SST state races).
concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write   # required to mint the OIDC JWT for AWS

jobs:
  # ─── 1. Verify: typecheck + build. Runs on EVERY push/PR. No AWS access. ──
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
        env:
          # Build runs WITHOUT real secrets; the cached data layer is designed
          # to degrade gracefully (empty homepage results) when DB is missing.
          # NEXT_PUBLIC_SITE_URL only affects canonicals/sitemaps/OG-urls — the
          # apex is fine here even pre-cutover because canonicals are
          # rebuilt + redeployed once DNS is flipped.
          NEXT_PUBLIC_SITE_URL: https://publicpulse.com.bd

  # ─── 2. Production: gated by GitHub Environment + required reviewer ─────
  # Only runs on a tag matching v*. The "production" environment in repo
  # settings has the required-reviewer rule — the job blocks until approved.
  # There is NO push-to-main auto-deploy path.
  deploy-production:
    needs: verify
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: production
      # The environment URL surfaces in the Actions UI once the deploy finishes.
      url: https://publicpulse.com.bd
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-southeast-1
          role-session-name: gha-publicpulse-production-${{ github.run_id }}

      - run: npm ci

      - name: SST deploy production
        run: npx sst deploy --stage production
